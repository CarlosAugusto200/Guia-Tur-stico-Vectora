<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - Vectora</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Deixe sua Avaliação</h1>
        <p>Sua opinião ajuda outros turistas.</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="pontos.html">Turismo e Cultura</a></li>
            <li><a href="avaliacao.html">Avaliações</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Login e Avaliação de Pontos Turísticos</h2>
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="usuario">Usuário:</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite seu nome de usuário" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="form-group">
                    <label for="ponto-turistico">Selecione o Ponto Turístico:</label>
                    <select id="ponto-turistico" name="ponto-turistico" required>
                        <option value="" disabled selected>Escolha uma opção...</option>
                        <option value="jardim">Jardim Botânico</option>
                        <option value="torre">Torre Central</option>
                        <option value="praca">Praça Central</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estrelas">Avaliação (Estrelas):</label>
                    <select id="estrelas" name="estrelas" required>
                        <option value="5">⭐⭐⭐⭐⭐ (5 - Excelente)</option>
                        <option value="4">⭐⭐⭐⭐ (4 - Muito Bom)</option>
                        <option value="3">⭐⭐⭐ (3 - Bom)</option>
                        <option value="2">⭐⭐ (2 - Regular)</option>
                        <option value="1">⭐ (1 - Ruim)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="comentario">Comentários Adicionais:</label>
                    <textarea id="comentario" name="comentario" rows="5" placeholder="Conte-nos como foi sua experiência..."></textarea>
                </div>

                <button type="submit">Enviar Avaliação</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Guia Turístico de Vectora. Desenvolvido para a disciplina de Desenvolv. Web I.</p>
    </footer>

</body>
</html>
